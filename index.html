<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="refresh" content="1; url=https://uqrqmmw.github.io/matha/">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#75675c">
  <link rel="canonical" href="https://uqrqmmw.github.io/matha/">
  <title>數A特訓已搬家</title>
  <style>
    :root { color-scheme: light; font-family: system-ui, "Noto Sans TC", sans-serif; color: #3f3a36; background: #f4f1ec; }
    body { min-height: 100vh; margin: 0; display: grid; place-items: center; }
    main { width: min(34rem, calc(100% - 3rem)); padding: 2.5rem; background: #fffdf9; border: 1px solid #d7d0c8; border-radius: 1rem; box-shadow: 0 1rem 3rem rgba(63, 58, 54, .08); }
    h1 { margin: 0 0 .8rem; font-size: 1.55rem; font-weight: 650; letter-spacing: .04em; }
    p { margin: .5rem 0; line-height: 1.8; color: #6b625b; }
    a { display: inline-block; margin-top: 1.2rem; padding: .7rem 1rem; border-radius: .6rem; color: #fff; background: #75675c; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <h1>數A特訓已搬到正確網站</h1>
    <p>這個網址是先前誤用的副本，不再更新。正在帶你前往由原始專案維護的正式版本。</p>
    <a href="https://uqrqmmw.github.io/matha/">前往正式數A特訓</a>
  </main>
  <script>
    const target = 'https://uqrqmmw.github.io/matha/';
    (async () => {
      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map((registration) => registration.unregister()));
        }
        if ('caches' in window) {
          const names = await caches.keys();
          await Promise.all(names.filter((name) => name.startsWith('matha-v')).map((name) => caches.delete(name)));
        }
      } finally {
        location.replace(target);
      }
    })();
  </script>
</body>
</html>
