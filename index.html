<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 移除 maximum-scale/user-scalable：讓 Android 能雙指放大密集數學/小灰字；畫線區各自 touch-action:none 防寫字時縮放衝突 -->

  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#0f766e">
  <title>數A特訓</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon-192.png?v=4">
  <link rel="apple-touch-icon" href="icon-192.png?v=4">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header><nav></nav></header>
  <main id="app"></main>
  <script src="vendor/supabase.js"></script><!-- 自架同源（原 CDN @2）：認證庫不再依賴 CDN，杜絕供應鏈竄改讀走密碼，且離線可用。版本 2.110.2 UMD，更新時重新下載 dist/umd/supabase.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk" crossorigin="anonymous"></script>
  <script src="bank.js"></script>
  <script src="app.js"></script>
  <script>
    // PWA：正式站註冊 service worker（artifact/file 環境會靜默跳過）
    if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
      var hadController = !!navigator.serviceWorker.controller; // 頁面載入時已有 controller＝之後的 controllerchange 是「更新」而非首裝
      navigator.serviceWorker.register('sw.js').then(function (reg) {
        // 長駐 PWA 不會自己拿到新 app.js：回前景時主動檢查更新
        document.addEventListener('visibilitychange', function () { if (document.visibilityState === 'visible') reg.update().catch(function () {}); });
      }).catch(function () {});
      // sw.js 安裝時已 skipWaiting＋claim→新版啟用即觸發 controllerchange。非首裝時提示重載，不強制打斷作答
      navigator.serviceWorker.addEventListener('controllerchange', function () {
        if (!hadController || document.getElementById('sw-update')) return;
        var bar = document.createElement('div');
        bar.id = 'sw-update';
        bar.style.cssText = 'position:fixed;left:0;right:0;bottom:0;z-index:99999;background:#0f766e;color:#fff;padding:10px 16px;display:flex;gap:14px;align-items:center;justify-content:center;font:14px/1.4 system-ui,sans-serif;box-shadow:0 -2px 14px rgba(0,0,0,.22)';
        bar.appendChild(document.createTextNode('有新版本可用'));
        var btn = document.createElement('button');
        btn.textContent = '立即更新';
        btn.style.cssText = 'background:#fff;color:#0f766e;border:0;border-radius:7px;padding:6px 16px;font-weight:700;cursor:pointer;font-size:14px';
        btn.onclick = function () { btn.textContent = '更新中…'; location.reload(); };
        bar.appendChild(btn);
        document.body.appendChild(bar);
      });
    }
  </script>
</body>
</html>
